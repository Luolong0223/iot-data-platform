{% extends "base_v2.html" %}

{% block title %}层级管理 - IoT数据平台{% endblock %}

{% block page_title %}层级管理{% endblock %}

{% block content %}
<div class="hierarchy-page">
    <!-- 顶部操作栏 -->
    <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-4">
            <div class="relative">
                <input type="text" id="searchInput" placeholder="搜索节点..." 
                       class="bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2 pl-10 text-sm focus:outline-none focus:border-blue-500 w-64 transition-colors">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
            </div>
            <select id="filterType" class="bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500">
                <option value="">全部类型</option>
                <option value="region">区域</option>
                <option value="building">建筑</option>
                <option value="floor">楼层</option>
                <option value="room">房间</option>
                <option value="device">设备</option>
            </select>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="hierarchyV2.expandAll()" class="px-4 py-2 bg-slate-700 text-white rounded-lg hover:bg-slate-600 transition-colors text-sm flex items-center gap-2">
                <i class="fas fa-expand-alt"></i> 展开全部
            </button>
            <button onclick="hierarchyV2.collapseAll()" class="px-4 py-2 bg-slate-700 text-white rounded-lg hover:bg-slate-600 transition-colors text-sm flex items-center gap-2">
                <i class="fas fa-compress-alt"></i> 折叠全部
            </button>
            <button onclick="hierarchyV2.showAddModal()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors text-sm flex items-center gap-2">
                <i class="fas fa-plus"></i> 添加节点
            </button>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="grid grid-cols-12 gap-6">
        <!-- 左侧：树形结构 -->
        <div class="col-span-5 bg-slate-800/30 backdrop-blur-xl rounded-2xl border border-slate-700/50 p-6">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-semibold text-white flex items-center gap-2">
                    <i class="fas fa-sitemap text-blue-400"></i> 组织架构
                </h3>
                <span id="nodeCount" class="text-xs px-2 py-1 bg-slate-700 rounded-full text-slate-300">0 个节点</span>
            </div>
            
            <!-- 树形结构容器 -->
            <div id="treeContainer" class="min-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                <div class="text-center py-12 text-slate-500">
                    <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
                    <p>加载中...</p>
                </div>
            </div>
        </div>

        <!-- 右侧：详情面板 -->
        <div class="col-span-7 bg-slate-800/30 backdrop-blur-xl rounded-2xl border border-slate-700/50 p-6">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-semibold text-white flex items-center gap-2">
                    <i class="fas fa-info-circle text-emerald-400"></i> 节点详情
                </h3>
                <div id="nodeActions" class="hidden flex items-center gap-2">
                    <button onclick="hierarchyV2.editNode()" class="p-2 hover:bg-slate-700 rounded-lg transition-colors" title="编辑">
                        <i class="fas fa-edit text-blue-400"></i>
                    </button>
                    <button onclick="hierarchyV2.deleteNode()" class="p-2 hover:bg-slate-700 rounded-lg transition-colors" title="删除">
                        <i class="fas fa-trash text-red-400"></i>
                    </button>
                    <button onclick="hierarchyV2.addChild()" class="p-2 hover:bg-slate-700 rounded-lg transition-colors" title="添加子节点">
                        <i class="fas fa-plus-circle text-emerald-400"></i>
                    </button>
                </div>
            </div>

            <!-- 节点详情内容 -->
            <div id="nodeDetail" class="min-h-[500px]">
                <div class="flex items-center justify-center h-full text-slate-500">
                    <div class="text-center">
                        <i class="fas fa-mouse-pointer text-4xl mb-3 opacity-50"></i>
                        <p>请选择一个节点查看详情</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 统计卡片 -->
    <div class="grid grid-cols-4 gap-6 mt-6">
        <div class="stat-card bg-gradient-to-br from-blue-600/20 to-blue-900/20 backdrop-blur-xl rounded-2xl border border-blue-500/20 p-6">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm text-slate-400 mb-1">总节点数</p>
                    <p id="totalNodes" class="text-3xl font-bold text-white">0</p>
                </div>
                <div class="w-14 h-14 rounded-xl bg-blue-500/20 flex items-center justify-center">
                    <i class="fas fa-project-diagram text-2xl text-blue-400"></i>
                </div>
            </div>
        </div>
        
        <div class="stat-card bg-gradient-to-br from-emerald-600/20 to-emerald-900/20 backdrop-blur-xl rounded-2xl border border-emerald-500/20 p-6">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm text-slate-400 mb-1">区域数量</p>
                    <p id="regionCount" class="text-3xl font-bold text-white">0</p>
                </div>
                <div class="w-14 h-14 rounded-xl bg-emerald-500/20 flex items-center justify-center">
                    <i class="fas fa-map-marked-alt text-2xl text-emerald-400"></i>
                </div>
            </div>
        </div>
        
        <div class="stat-card bg-gradient-to-br from-purple-600/20 to-purple-900/20 backdrop-blur-xl rounded-2xl border border-purple-500/20 p-6">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm text-slate-400 mb-1">设备总数</p>
                    <p id="deviceCount" class="text-3xl font-bold text-white">0</p>
                </div>
                <div class="w-14 h-14 rounded-xl bg-purple-500/20 flex items-center justify-center">
                    <i class="fas fa-microchip text-2xl text-purple-400"></i>
                </div>
            </div>
        </div>
        
        <div class="stat-card bg-gradient-to-br from-orange-600/20 to-orange-900/20 backdrop-blur-xl rounded-2xl border border-orange-500/20 p-6">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm text-slate-400 mb-1">最大深度</p>
                    <p id="maxDepth" class="text-3xl font-bold text-white">0</p>
                </div>
                <div class="w-14 h-14 rounded-xl bg-orange-500/20 flex items-center justify-center">
                    <i class="fas fa-layer-group text-2xl text-orange-400"></i>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 添加/编辑节点模态框 -->
<div id="nodeModal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="hierarchyV2.closeModal()"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-md">
        <div class="bg-slate-800 rounded-2xl border border-slate-700 shadow-2xl p-6 m-4">
            <div class="flex items-center justify-between mb-6">
                <h3 id="modalTitle" class="text-xl font-semibold text-white">添加节点</h3>
                <button onclick="hierarchyV2.closeModal()" class="p-2 hover:bg-slate-700 rounded-lg transition-colors">
                    <i class="fas fa-times text-slate-400"></i>
                </button>
            </div>
            
            <form id="nodeForm" onsubmit="hierarchyV2.saveNode(event)">
                <input type="hidden" id="nodeId" value="">
                <input type="hidden" id="parentId" value="">
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">节点名称 *</label>
                        <input type="text" id="nodeName" required
                               class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 transition-colors"
                               placeholder="输入节点名称">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">节点类型 *</label>
                        <select id="nodeType" required
                                class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 transition-colors">
                            <option value="">选择类型</option>
                            <option value="region">区域</option>
                            <option value="building">建筑</option>
                            <option value="floor">楼层</option>
                            <option value="room">房间</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">描述</label>
                        <textarea id="nodeDesc" rows="3"
                                  class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 transition-colors resize-none"
                                  placeholder="输入节点描述（可选）"></textarea>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-2">经度</label>
                            <input type="number" step="any" id="nodeLng"
                                   class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 transition-colors"
                                   placeholder="116.404">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-2">纬度</label>
                            <input type="number" step="any" id="nodeLat"
                                   class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 transition-colors"
                                   placeholder="39.915">
                        </div>
                    </div>
                </div>
                
                <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-slate-700">
                    <button type="button" onclick="hierarchyV2.closeModal()" 
                            class="px-5 py-2.5 bg-slate-700 text-white rounded-lg hover:bg-slate-600 transition-colors">
                        取消
                    </button>
                    <button type="submit" 
                            class="px-5 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-2">
                        <i class="fas fa-save"></i> 保存
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/v2/hierarchy.js') }}"></script>
{% endblock %}
