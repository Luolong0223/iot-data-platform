{% extends "base_v2.html" %}

{% block title %}告警规则 - IoT数据平台{% endblock %}

{% block page_title %}告警规则配置{% endblock %}

{% block content %}
<div classalarm-rules-page">
    <!-- 顶部操作栏 -->
    <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-4">
            <div class="relative">
                <input type="text" id="searchInput" placeholder="搜索规则..." 
                       class="bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2 pl-10 text-sm focus:outline-none focus:border-blue-500 w-64 transition-colors">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
            </div>
            <select id="levelFilter" class="bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500">
                <option value="">全部级别</option>
                <option value="critical">严重</option>
                <option value="warning">警告</option>
                <option value="info">信息</option>
            </select>
            <select id="statusFilter" class="bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500">
                <option value="">全部状态</option>
                <option value="active">已启用</option>
                <option value="inactive">已禁用</option>
            </select>
        </div>
        <button onclick="alarmRulesV2.showAddModal()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors text-sm flex items-center gap-2">
            <i class="fas fa-plus"></i> 新建规则
        </button>
    </div>

    <!-- 规则统计卡片 -->
    <div class="grid grid-cols-4 gap-6 mb-6">
        <div class="bg-gradient-to-br from-blue-600/20 to-blue-900/20 backdrop-blur-xl rounded-2xl border border-blue-500/20 p-6">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm text-slate-400 mb-1">总规则数</p>
                    <p id="totalRules" class="text-3xl font-bold text-white">0</p>
                </div>
                <div class="w-14 h-14 rounded-xl bg-blue-500/20 flex items-center justify-center">
                    <i class="fas fa-list-alt text-2xl text-blue-400"></i>
                </div>
            </div>
        </div>
        
        <div class="bg-gradient-to-br from-emerald-600/20 to-emerald-900/20 backdrop-blur-xl rounded-2xl border border-emerald-500/20 p-6">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm text-slate-400 mb-1">已启用</p>
                    <p id="activeRules" class="text-3xl font-bold text-white">0</p>
                </div>
                <div class="w-14 h-14 rounded-xl bg-emerald-500/20 flex items-center justify-center">
                    <i class="fas fa-check-circle text-2xl text-emerald-400"></i>
                </div>
            </div>
        </div>
        
        <div class="bg-gradient-to-br from-red-600/20 to-red-900/20 backdrop-blur-xl rounded-2xl border border-red-500/20 p-6">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm text-slate-400 mb-1">严重级别</p>
                    <p id="criticalRules" class="text-3xl font-bold text-white">0</p>
                </div>
                <div class="w-14 h-14 rounded-xl bg-red-500/20 flex items-center justify-center">
                    <i class="fas fa-exclamation-triangle text-2xl text-red-400"></i>
                </div>
            </div>
        </div>
        
        <div class="bg-gradient-to-br from-orange-600/20 to-orange-900/20 backdrop-blur-xl rounded-2xl border border-orange-500/20 p-6">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm text-slate-400 mb-1">今日触发</p>
                    <p id="todayTriggers" class="text-3xl font-bold text-white">0</p>
                </div>
                <div class="w-14 h-14 rounded-xl bg-orange-500/20 flex items-center justify-center">
                    <i class="fas fa-bell text-2xl text-orange-400"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- 规则列表 -->
    <div class="bg-slate-800/30 backdrop-blur-xl rounded-2xl border border-slate-700/50 overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-700/50 flex items-center justify-between">
            <h3 class="text-lg font-semibold text-white flex items-center gap-2">
                <i class="fas fa-sliders-h text-purple-400"></i> 规则列表
            </h3>
            <span id="ruleCount" class="text-xs px-2 py-1 bg-slate-700 rounded-full text-slate-300">0 条规则</span>
        </div>
        
        <div id="rulesListContainer" class="divide-y divide-slate-700/50">
            <div class="text-center py-12 text-slate-500">
                <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
                <p>加载中...</p>
            </div>
        </div>
    </div>
</div>

<!-- 添加/编辑规则模态框 -->
<div id="ruleModal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="alarmRulesV2.closeModal()"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-2xl max-h-[90vh] overflow-y-auto">
        <div class="bg-slate-800 rounded-2xl border border-slate-700 shadow-2xl p-6 m-4">
            <div class="flex items-center justify-between mb-6">
                <h3 id="modalTitle" class="text-xl font-semibold text-white">新建告警规则</h3>
                <button onclick="alarmRulesV2.closeModal()" class="p-2 hover:bg-slate-700 rounded-lg transition-colors">
                    <i class="fas fa-times text-slate-400"></i>
                </button>
            </div>
            
            <form id="ruleForm" onsubmit="alarmRulesV2.saveRule(event)">
                <input type="hidden" id="ruleId" value="">
                
                <div class="space-y-5">
                    <!-- 基本信息 -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-2">规则名称 *</label>
                            <input type="text" id="ruleName" required
                                   class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 transition-colors"
                                   placeholder="例如：温度超限告警">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-2">告警级别 *</label>
                            <select id="ruleLevel" required
                                    class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 transition-colors">
                                <option value="">选择级别</option>
                                <option value="critical">严重 (Critical)</option>
                                <option value="warning">警告 (Warning)</option>
                                <option value="info">信息 (Info)</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- 触发条件 -->
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">触发条件</label>
                        
                        <div class="bg-slate-900/50 rounded-xl p-4 space-y-3">
                            <div class="grid grid-cols-3 gap-3">
                                <select id="conditionField" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500">
                                    <option value="value">数据值</option>
                                    <option value="rate_of_change">变化率</option>
                                    <option value="device_status">设备状态</option>
                                </select>
                                
                                <select id="conditionOperator" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500">
                                    <option value=">">大于 (&gt;)</option>
                                    <option value="<">小于 (&lt;)</option>
                                    <option value=">=">大于等于 (&gt;=)</option>
                                    <option value="<=">小于等于 (&lt;=)</option>
                                    <option value="==">等于 (==)</option>
                                    <option value="!=">不等于 (!=)</option>
                                </select>
                                
                                <input type="text" id="conditionValue" 
                                       class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500"
                                       placeholder="阈值">
                            </div>
                            
                            <div class="flex items-center gap-3 pt-2 border-t border-slate-700">
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="checkbox" id="enableDuration" class="w-4 h-4 rounded text-blue-600">
                                    <span class="text-sm text-slate-300">持续时长</span>
                                </label>
                                <input type="number" id="durationSeconds" value="30" min="1"
                                       class="w-24 bg-slate-800 border border-slate-700 rounded-lg px-3 py-1.5 text-sm text-white focus:outline-none focus:border-blue-500"
                                       disabled>
                                <span class="text-sm text-slate-400">秒后触发</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 关联设备 -->
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">关联设备（留空表示所有设备）</label>
                        <select id="ruleDevices" multiple
                                class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 transition-colors min-h-[100px]">
                            <!-- 动态加载 -->
                        </select>
                        <p class="text-xs text-slate-500 mt-1">按住 Ctrl 键多选</p>
                    </div>
                    
                    <!-- 通知方式 -->
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">通知方式</label>
                        <div class="flex flex-wrap gap-3">
                            <label class="flex items-center gap-2 cursor-pointer bg-slate-900/50 px-4 py-2 rounded-lg border border-slate-700 hover:border-blue-500 transition-colors">
                                <input type="checkbox" name="notify_methods" value="web" checked class="w-4 h-4 rounded text-blue-600">
                                <span class="text-sm text-slate-300">Web通知</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer bg-slate-900/50 px-4 py-2 rounded-lg border border-slate-700 hover:border-blue-500 transition-colors">
                                <input type="checkbox" name="notify_methods" value="email" class="w-4 h-4 rounded text-blue-600">
                                <span class="text-sm text-slate-300">邮件</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer bg-slate-900/50 px-4 py-2 rounded-lg border border-slate-700 hover:border-blue-500 transition-colors">
                                <input type="checkbox" name="notify_methods" value="sms" class="w-4 h-4 rounded text-blue-600">
                                <span class="text-sm text-slate-300">短信</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer bg-slate-900/50 px-4 py-2 rounded-lg border border-slate-700 hover:border-blue-500 transition-colors">
                                <input type="checkbox" name="notify_methods" value="webhook" class="w-4 h-4 rounded text-blue-600">
                                <span class="text-sm text-slate-300">Webhook</span>
                            </label>
                        </div>
                    </div>
                    
                    <!-- 描述 -->
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">描述</label>
                        <textarea id="ruleDesc" rows="3"
                                  class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 transition-colors resize-none"
                                  placeholder="输入规则描述（可选）"></textarea>
                    </div>
                </div>
                
                <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-slate-700">
                    <button type="button" onclick="alarmRulesV2.closeModal()" 
                            class="px-5 py-2.5 bg-slate-700 text-white rounded-lg hover:bg-slate-600 transition-colors">
                        取消
                    </button>
                    <button type="submit" 
                            class="px-5 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-2">
                        <i class="fas fa-save"></i> 保存
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/v2/alarm-rules.js') }}"></script>
{% endblock %}
