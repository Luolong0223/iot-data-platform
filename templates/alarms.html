{% extends "base.html" %}

{% block title %}报警管理 - IoT Data Platform{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css">
{% endblock %}

{% block content %}
<div class="fade-in">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0"><i class="bi bi-bell"></i> 报警管理</h4>
    </div>

    <ul class="nav nav-tabs mb-3" id="alarmTab" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="rules-tab" data-bs-toggle="tab" data-bs-target="#rules-panel" type="button" role="tab">
                <i class="bi bi-sliders"></i> 报警规则
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="records-tab" data-bs-toggle="tab" data-bs-target="#records-panel" type="button" role="tab">
                <i class="bi bi-clock-history"></i> 报警记录
            </button>
        </li>
    </ul>

    <div class="tab-content" id="alarmTabContent">
        <!-- 报警规则 Tab -->
        <div class="tab-pane fade show active" id="rules-panel" role="tabpanel">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span>报警规则列表</span>
                    <button class="btn btn-sm btn-primary" onclick="openRuleModal()">
                        <i class="bi bi-plus"></i> 新增规则
                    </button>
                </div>
                <div class="card-body">
                    <table class="table table-striped" id="rulesTable" style="width:100%">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>设备</th>
                                <th>通道</th>
                                <th>数据点</th>
                                <th>条件</th>
                                <th>阈值</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 报警记录 Tab -->
        <div class="tab-pane fade" id="records-panel" role="tabpanel">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span>报警记录列表</span>
                    <button class="btn btn-sm btn-outline-secondary" onclick="markAllRead()">
                        <i class="bi bi-check-all"></i> 全部标记已读
                    </button>
                </div>
                <div class="card-body">
                    <table class="table table-striped" id="recordsTable" style="width:100%">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>规则</th>
                                <th>消息</th>
                                <th>实际值</th>
                                <th>阈值</th>
                                <th>时间</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Rule Modal -->
<div class="modal fade" id="ruleModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="ruleModalTitle">新增报警规则</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="ruleForm">
                    <input type="hidden" id="ruleId">
                    <div class="mb-3">
                        <label class="form-label">设备名称</label>
                        <input type="text" class="form-control" id="ruleDeviceName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">通道名称</label>
                        <input type="text" class="form-control" id="ruleChannelName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">数据点名称</label>
                        <input type="text" class="form-control" id="rulePointName" required>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">条件</label>
                            <select class="form-select" id="ruleCondition" required>
                                <option value="gt">大于 (&gt;)</option>
                                <option value="lt">小于 (&lt;)</option>
                                <option value="eq">等于 (=)</option>
                            </select>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">阈值</label>
                            <input type="number" class="form-control" id="ruleThreshold" step="any" required>
                        </div>
                    </div>
                    <div class="mb-3 form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="ruleEnabled" checked>
                        <label class="form-check-label" for="ruleEnabled">启用规则</label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveRule()">保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
<script src="{{ url_for('static', filename='js/alarms.js') }}"></script>
{% endblock %}
