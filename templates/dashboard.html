{% extends "base_v2.html" %}
{% block title %}数据展示 - 遵义流量计采集测试{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <!-- 顶部汇总卡片 -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card stat-card stat-card-primary">
                <div class="card-body">
                    <div class="stat-label">设备总数</div>
                    <div class="stat-value" id="totalDevices">--</div>
                    <div class="stat-extra">在线 <span id="onlineDevices">--</span> · 离线 <span id="offlineDevices">--</span></div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card stat-card-success">
                <div class="card-body">
                    <div class="stat-label">已选数据点</div>
                    <div class="stat-value" id="totalWidgets">--</div>
                    <div class="stat-extra">展示在数据展示</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card stat-card-info">
                <div class="card-body">
                    <div class="stat-label">最近更新</div>
                    <div class="stat-value" id="latestUpdate">--</div>
                    <div class="stat-extra">最后一条数据</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card stat-card-warning">
                <div class="card-body">
                    <div class="stat-label">实时刷新</div>
                    <div class="stat-value">
                        <div class="form-check form-switch d-inline-block">
                            <input class="form-check-input" type="checkbox" id="autoRefreshToggle" checked>
                        </div>
                    </div>
                    <div class="stat-extra">每 <span id="refreshInterval">3</span> 秒</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 工具栏 -->
    <div class="card mb-3">
        <div class="card-body py-2">
            <div class="d-flex align-items-center justify-content-between">
                <div>
                    <button class="btn btn-primary btn-sm" id="addWidgetBtn">
                        <i class="bi bi-plus-lg"></i> 添加数据点
                    </button>
                    <button class="btn btn-outline-light btn-sm" id="refreshNowBtn">
                        <i class="bi bi-arrow-clockwise"></i> 立即刷新
                    </button>
                </div>
                <div>
                    <span class="text-muted small">布局可拖拽重排</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 数据点卡片 -->
    <div class="row g-3" id="widgetsContainer">
        <div class="col-12 text-center text-muted py-5" id="emptyState">
            <i class="bi bi-inbox" style="font-size: 3rem;"></i>
            <p class="mt-3">还没有添加数据点,点击 "添加数据点" 按钮开始</p>
        </div>
    </div>
</div>

<!-- 添加数据点 Modal -->
<div class="modal fade" id="addWidgetModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content bg-dark text-light">
            <div class="modal-header border-secondary">
                <h5 class="modal-title"><i class="bi bi-plus-circle"></i> 选择要显示的数据点</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <input type="text" class="form-control bg-secondary text-light border-0" id="searchDataPoint" placeholder="搜索设备/通道/数据点...">
                </div>
                <div id="deviceListContainer">
                    <div class="text-center text-muted py-4">加载中...</div>
                </div>
            </div>
            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/v2/dashboard.js') }}"></script>
{% endblock %}
