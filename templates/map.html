{% extends "base.html" %}

{% set full_width = true %}

{% block title %}地图展示 - IoT Data Platform{% endblock %}

{% block content %}
<div class="fade-in">
    <div class="d-flex justify-content-between align-items-center mb-2 px-2">
        <h4 class="mb-0"><i class="bi bi-geo-alt"></i> 设备地图</h4>
        <div class="d-flex gap-2">
            <button class="btn btn-sm btn-outline-primary" onclick="refreshMapData()">
                <i class="bi bi-arrow-clockwise"></i> 刷新
            </button>
            <button class="btn btn-sm btn-outline-secondary" onclick="fitAllMarkers()">
                <i class="bi bi-fullscreen"></i> 全览
            </button>
        </div>
    </div>
    <div id="map"></div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://api.map.baidu.com/api?v=3.0&ak={{ baidu_map_ak }}"></script>
<script src="{{ url_for('static', filename='js/map.js') }}"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    initBaiduMap('map', 106.7135, 26.5933, 12);
    loadDeviceMarkers();
});
</script>
{% endblock %}
