{% extends "base.html" %}

{% set full_width = true %}

{% block title %}设备地图 - IoT数据平台{% endblock %}

{% block head %}
<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
#map { 
    height: calc(100vh - 140px); 
    border-radius: 8px;
    z-index: 1;
}

.device-marker {
    background: transparent;
    border: none;
}

.marker-pin {
    width: 30px;
    height: 30px;
    border-radius: 50% 50% 50% 0;
    position: absolute;
    transform: rotate(-45deg);
    left: 50%;
    top: 50%;
    margin: -15px 0 0 -15px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
}

.marker-pin i {
    font-size: 14px;
    color: white;
    transform: rotate(45deg);
}

.marker-label {
    position: absolute;
    top: -25px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    white-space: nowrap;
}

.device-popup .popup-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 8px;
    border-bottom: 1px solid #eee;
    margin-bottom: 8px;
}

.device-popup .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
}

.device-popup .popup-footer {
    display: flex;
    gap: 8px;
    padding-top: 8px;
    border-top: 1px solid #eee;
    margin-top: 8px;
}

.map-tip-card {
    background: white;
    border-radius: 8px;
    margin: 10px;
}

.leaflet-popup-content-wrapper {
    border-radius: 8px;
}

.leaflet-popup-content {
    margin: 12px;
}
</style>
{% endblock %}

{% block content %}
<div class="fade-in">
    <div class="d-flex justify-content-between align-items-center mb-3 px-2">
        <div>
            <h4 class="mb-1"><i class="bi bi-geo-alt text-primary"></i> 设备地图</h4>
            <small class="text-muted">实时查看设备地理位置和状态</small>
        </div>
        <div class="d-flex gap-2">
            <div class="btn-group">
                <button class="btn btn-sm btn-outline-primary" onclick="refreshMapData()">
                    <i class="bi bi-arrow-clockwise"></i> 刷新
                </button>
                <button class="btn btn-sm btn-outline-secondary" onclick="fitAllMarkers()">
                    <i class="bi bi-fullscreen"></i> 全览
                </button>
            </div>
        </div>
    </div>
    
    <div class="card border-0 shadow-sm">
        <div id="map"></div>
    </div>
    
    <div class="row mt-3">
        <div class="col-12">
            <div class="card">
                <div class="card-body py-2">
                    <div class="d-flex align-items-center gap-4 flex-wrap">
                        <span class="text-muted small">图例：</span>
                        <span class="badge d-flex align-items-center gap-1" style="background-color: #198754;">
                            <span class="rounded-circle bg-white" style="width:6px;height:6px;"></span> 在线
                        </span>
                        <span class="badge d-flex align-items-center gap-1" style="background-color: #ffc107; color: #212529;">
                            <span class="rounded-circle bg-white" style="width:6px;height:6px;"></span> 部分在线
                        </span>
                        <span class="badge d-flex align-items-center gap-1" style="background-color: #dc3545;">
                            <span class="rounded-circle bg-white" style="width:6px;height:6px;"></span> 离线
                        </span>
                        <span class="text-muted small ms-auto">
                            <i class="bi bi-info-circle"></i> 点击标记查看设备详情
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="{{ url_for('static', filename='js/map.js') }}"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    // 使用配置的默认位置或中国中心位置
    const defaultLat = {{ config.MAP_DEFAULT_LAT | default(35.8617) }};
    const defaultLng = {{ config.MAP_DEFAULT_LNG | default(104.1954) }};
    const defaultZoom = {{ config.MAP_DEFAULT_ZOOM | default(4) }};
    
    initBaiduMap('map', defaultLng, defaultLat, defaultZoom);
    loadDeviceMarkers();
});
</script>
{% endblock %}
