{% extends "base_v2.html" %}

{% block title %}告警管理 - IoT数据平台{% endblock %}

{% block content %}
<div class="page-container">
    <!-- 页面头部 -->
    <div class="page-header">
        <div class="page-header-left">
            <h1 class="page-title">告警管理</h1>
            <p class="page-subtitle">实时监控设备告警，快速响应异常情况</p>
        </div>
        <div class="page-header-right">
            <button class="btn btn-outline" onclick="refreshAlarms()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                刷新
            </button>
            <button class="btn btn-primary" onclick="showAddRuleModal()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                新建规则
            </button>
        </div>
    </div>

    <!-- 统计卡片 -->
    <div class="stats-grid stats-4">
        <div class="stat-card stat-card-danger">
            <div class="stat-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            </div>
            <div class="stat-content">
                <span class="stat-value" id="critical-count">--</span>
                <span class="stat-label">严重告警</span>
            </div>
        </div>
        <div class="stat-card stat-card-warning">
            <div class="stat-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </div>
            <div class="stat-content">
                <span class="stat-value" id="warning-count">--</span>
                <span class="stat-label">警告告警</span>
            </div>
        </div>
        <div class="stat-card stat-card-info">
            <div class="stat-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
            </div>
            <div class="stat-content">
                <span class="stat-value" id="info-count">--</span>
                <span class="stat-label">信息通知</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            </div>
            <div class="stat-content">
                <span class="stat-value" id="resolved-count">--</span>
                <span class="stat-label">今日已处理</span>
            </div>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="content-grid">
        <!-- 告警列表 -->
        <div class="card card-main">
            <div class="card-header">
                <h3 class="card-title">实时告警</h3>
                <div class="card-actions">
                    <select class="form-select form-select-sm" id="severity-filter" onchange="filterAlarms()">
                        <option value="">全部级别</option>
                        <option value="critical">严重</option>
                        <option value="warning">警告</option>
                        <option value="info">信息</option>
                    </select>
                    <select class="form-select form-select-sm" id="status-filter" onchange="filterAlarms()">
                        <option value="">全部状态</option>
                        <option value="active">未处理</option>
                        <option value="acknowledged">已确认</option>
                        <option value="resolved">已解决</option>
                    </select>
                </div>
            </div>
            <div class="table-responsive">
                <table class="data-table" id="alarms-table">
                    <thead>
                        <tr>
                            <th>状态</th>
                            <th>级别</th>
                            <th>告警内容</th>
                            <th>设备</th>
                            <th>触发时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="alarms-tbody">
                        <tr><td colspan="6" class="text-center text-muted py-4">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination-wrapper" id="alarms-pagination"></div>
        </div>

        <!-- 告警规则 -->
        <div class="card card-side">
            <div class="card-header">
                <h3 class="card-title">告警规则</h3>
                <button class="btn btn-sm btn-primary" onclick="showAddRuleModal()">+ 新增</button>
            </div>
            <div class="rules-list" id="rules-list">
                <div class="text-center text-muted py-4">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 告警趋势图 -->
    <div class="card mt-4">
        <div class="card-header">
            <h3 class="card-title">告警趋势（近7天）</h3>
        </div>
        <div class="chart-container">
            <canvas id="alarm-trend-chart"></canvas>
        </div>
    </div>
</div>

<!-- 添加/编辑规则弹窗 -->
<div class="modal-overlay" id="rule-modal" style="display: none;">
    <div class="modal modal-md">
        <div class="modal-header">
            <h4 class="modal-title" id="rule-modal-title">新建告警规则</h4>
            <button class="modal-close" onclick="closeRuleModal()">&times;</button>
        </div>
        <div class="modal-body">
            <form id="rule-form">
                <input type="hidden" name="id" id="rule-id">
                <div class="form-group">
                    <label class="form-label">规则名称</label>
                    <input type="text" class="form-input" name="name" placeholder="输入规则名称" required>
                </div>
                <div class="form-group">
                    <label class="form-label">监控设备</label>
                    <select class="form-select" name="device_name" id="rule-device" required>
                        <option value="">选择设备</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label class="form-label">条件</label>
                            <select class="form-select" name="condition" required>
                                <option value="gt">大于 (>)</option>
                                <option value="gte">大于等于 (≥)</option>
                                <option value="lt">小于 (<)</option>
                                <option value="lte">小于等于 (≤)</option>
                                <option value="eq">等于 (=)</option>
                                <option value="neq">不等于 (!=)</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label class="form-label">阈值</label>
                            <input type="number" class="form-input" name="threshold" step="any" placeholder="阈值" required>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">告警级别</label>
                    <select class="form-select" name="severity" required>
                        <option value="info">信息</option>
                        <option value="warning">警告</option>
                        <option value="critical">严重</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-check">
                        <input type="checkbox" name="enabled" checked>
                        <span>启用此规则</span>
                    </label>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeRuleModal()">取消</button>
            <button class="btn btn-primary" onclick="saveRule()">保存</button>
        </div>
    </div>
</div>

<!-- 告警详情弹窗 -->
<div class="modal-overlay" id="alarm-detail-modal" style="display: none;">
    <div class="modal modal-lg">
        <div class="modal-header">
            <h4 class="modal-title">告警详情</h4>
            <button class="modal-close" onclick="closeAlarmDetail()">&times;</button>
        </div>
        <div class="modal-body" id="alarm-detail-body">
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeAlarmDetail()">关闭</button>
            <button class="btn btn-success" id="resolve-btn" onclick="resolveAlarm()">标记已解决</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/v2/alarms.js') }}"></script>
{% endblock %}
