{% extends "base.html" %}

{% block title %}服务器错误 - IoT Data Platform{% endblock %}

{% block content %}
<div class="text-center py-5 fade-in">
    <div class="mb-4">
        <i class="bi bi-exclamation-triangle" style="font-size: 6rem; color: var(--danger-color);"></i>
    </div>
    <h1 class="display-4 fw-bold" style="color: var(--danger-color);">500</h1>
    <h3 class="mb-3">服务器内部错误</h3>
    <p class="text-muted mb-4">服务器遇到了意外情况，无法完成您的请求。</p>
    <a href="{{ url_for('pages.dashboard') }}" class="btn btn-primary btn-lg">
        <i class="bi bi-house"></i> 返回首页
    </a>
    <button class="btn btn-outline-secondary btn-lg ms-2" onclick="location.reload()">
        <i class="bi bi-arrow-clockwise"></i> 刷新页面
    </button>
</div>
{% endblock %}
