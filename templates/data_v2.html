{% extends "base_v2.html" %}

{% block title %}数据查看 - IoT平台{% endblock %}

{% block content %}
<div class="page-container">
    <!-- 页面头部 -->
    <div class="page-header">
        <div>
            <h1>数据查看</h1>
            <p class="text-muted">实时监控设备数据，支持多维度筛选和导出</p>
        </div>
        <div class="header-actions">
            <button class="btn btn-outline" onclick="exportData()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                导出数据
            </button>
        </div>
    </div>

    <!-- 筛选区域 -->
    <div class="card filter-card">
        <div class="filter-row">
            <div class="filter-group">
                <label>设备</label>
                <select id="filterDevice" class="form-select" onchange="loadData()">
                    <option value="">全部设备</option>
                </select>
            </div>
            <div class="filter-group">
                <label>通道</label>
                <select id="filterChannel" class="form-select" onchange="loadData()">
                    <option value="">全部通道</option>
                </select>
            </div>
            <div class="filter-group">
                <label>时间范围</label>
                <select id="filterTimeRange" class="form-select" onchange="loadData()">
                    <option value="1h">最近1小时</option>
                    <option value="6h">最近6小时</option>
                    <option value="24h" selected>最近24小时</option>
                    <option value="7d">最近7天</option>
                    <option value="30d">最近30天</option>
                </select>
            </div>
            <div class="filter-group">
                <label>自定义时间</label>
                <input type="datetime-local" id="filterStartTime" class="form-input">
            </div>
            <div class="filter-group">
                <label>至</label>
                <input type="datetime-local" id="filterEndTime" class="form-input">
            </div>
            <button class="btn btn-primary" onclick="loadData()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                查询
            </button>
            <button class="btn btn-ghost" onclick="resetFilters()">重置</button>
        </div>
    </div>

    <!-- 数据统计卡片 -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon bg-primary/10 text-primary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
            </div>
            <div class="stat-content">
                <span class="stat-value" id="totalPoints">--</span>
                <span class="stat-label">数据点总数</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon bg-success/10 text-success">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 6l-9.5 9.5-5-5L1 18"/><polyline points="17,6 23,6 23,12"/></svg>
            </div>
            <div class="stat-content">
                <span class="stat-value" id="avgValue">--</span>
                <span class="stat-label">平均值</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon bg-warning/10 text-warning">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18,15 12,9 6,15"/></svg>
            </div>
            <div class="stat-content">
                <span class="stat-value" id="maxValue">--</span>
                <span class="stat-label">最大值</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon bg-danger/10 text-danger">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6,9 12,15 18,9"/></svg>
            </div>
            <div class="stat-content">
                <span class="stat-value" id="minValue">--</span>
                <span class="stat-label">最小值</span>
            </div>
        </div>
    </div>

    <!-- 图表区域 -->
    <div class="card chart-card">
        <div class="card-header">
            <h3>数据趋势图</h3>
            <div class="chart-actions">
                <button class="chart-type-btn active" data-type="line" onclick="setChartType('line')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
                </button>
                <button class="chart-type-btn" data-type="bar" onclick="setChartType('bar')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="12" width="4" height="9"/><rect x="10" y="8" width="4" height="13"/><rect x="17" y="4" width="4" height="17"/></svg>
                </button>
            </div>
        </div>
        <div class="chart-container">
            <canvas id="dataChart"></canvas>
        </div>
    </div>

    <!-- 数据表格 -->
    <div class="card table-card">
        <div class="card-header">
            <h3>数据记录</h3>
            <div class="table-info">
                <span id="dataCount">0 条记录</span>
                <div class="pagination" id="pagination"></div>
            </div>
        </div>
        <div class="table-wrapper">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>设备</th>
                        <th>通道</th>
                        <th>数值</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    <tr><td colspan="5" class="empty-state">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- 设备详情弹窗 -->
<div class="modal-overlay" id="deviceDetailModal" style="display: none;">
    <div class="modal modal-lg">
        <div class="modal-header">
            <h3>设备详情</h3>
            <button class="modal-close" onclick="closeDeviceDetail()">&times;</button>
        </div>
        <div class="modal-body" id="deviceDetailContent">
        </div>
    </div>
</div>

<script src="/static/js/v2/data.js?v=2.0"></script>
{% endblock %}
