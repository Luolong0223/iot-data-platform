{% extends "base_v2.html" %}

{% block title %}地图展示 - IoT数据平台{% endblock %}

{% block page_title %}地图展示{% endblock %}

{% block content %}
<div class="map-page">
    <!-- 顶部工具栏 -->
    <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-4">
            <select id="mapType" class="bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500">
                <option value="normal">标准地图</option>
                <option value="satellite">卫星地图</option>
                <option value="terrain">地形图</option>
            </select>
            
            <select id="deviceFilter" class="bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500">
                <option value="">全部设备</option>
                <option value="online">在线设备</option>
                <option value="offline">离线设备</option>
                <option value="alarm">告警设备</option>
            </select>

            <label class="flex items-center gap-2 cursor-pointer bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2 text-sm hover:bg-slate-700/50 transition-colors">
                <input type="checkbox" id="showHeatmap" class="w-4 h-4 rounded text-blue-600">
                <span>热力图</span>
            </label>
        </div>
        
        <div class="flex items-center gap-3">
            <button onclick="mapV2.refreshDevices()" class="px-4 py-2 bg-slate-700 text-white rounded-lg hover:bg-slate-600 transition-colors text-sm flex items-center gap-2">
                <i class="fas fa-sync-alt"></i> 刷新
            </button>
            <button onclick="mapV2.fitAllMarkers()" class="px-4 py-2 bg-slate-700 text-white rounded-lg hover:bg-slate-600 transition-colors text-sm flex items-center gap-2">
                <i class="fas fa-compress-arrows-alt"></i> 适应视图
            </button>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="grid grid-cols-12 gap-6">
        <!-- 地图区域 -->
        <div class="col-span-9 bg-slate-800/30 backdrop-blur-xl rounded-2xl border border-slate-700/50 overflow-hidden relative" style="height: calc(100vh - 280px); min-height: 500px;">
            <div id="mapContainer" class="w-full h-full"></div>
            
            <!-- 地图加载提示 -->
            <div id="mapLoading" class="absolute inset-0 flex items-center justify-center bg-slate-900/80 z-10">
                <div class="text-center">
                    <i class="fas fa-spinner fa-spin text-3xl text-blue-400 mb-3"></i>
                    <p class="text-slate-300">地图加载中...</p>
                </div>
            </div>
        </div>

        <!-- 右侧面板 -->
        <div class="col-span-3 space-y-6">
            <!-- 设备统计 -->
            <div class="bg-slate-800/30 backdrop-blur-xl rounded-2xl border border-slate-700/50 p-5">
                <h3 class="text-lg font-semibold text-white mb-4 flex items-center gap-2">
                    <i class="fas fa-chart-pie text-blue-400"></i> 设备统计
                </h3>
                
                <div class="space-y-4">
                    <div class="flex items-center justify-between p-3 bg-slate-900/50 rounded-lg">
                        <div class="flex items-center gap-3">
                            <span class="w-3 h-3 rounded-full bg-emerald-500"></span>
                            <span class="text-sm text-slate-300">在线设备</span>
                        </div>
                        <span id="onlineCount" class="font-semibold text-emerald-400">0</span>
                    </div>
                    
                    <div class="flex items-center justify-between p-3 bg-slate-900/50 rounded-lg">
                        <div class="flex items-center gap-3">
                            <span class="w-3 h-3 rounded-full bg-slate-500"></span>
                            <span class="text-sm text-slate-300">离线设备</span>
                        </div>
                        <span id="offlineCount" class="font-semibold text-slate-400">0</span>
                    </div>
                    
                    <div class="flex items-center justify-between p-3 bg-slate-900/50 rounded-lg">
                        <div class="flex items-center gap-3">
                            <span class="w-3 h-3 rounded-full bg-red-500"></span>
                            <span class="text-sm text-slate-300">告警设备</span>
                        </div>
                        <span id="alarmCount" class="font-semibold text-red-400">0</span>
                    </div>
                </div>
            </div>

            <!-- 设备列表 -->
            <div class="bg-slate-800/30 backdrop-blur-xl rounded-2xl border border-slate-700/50 p-5 max-h-[400px] overflow-hidden flex flex-col">
                <h3 class="text-lg font-semibold text-white mb-4 flex items-center gap-2">
                    <i class="fas fa-list text-emerald-400"></i> 设备列表
                </h3>
                
                <div id="deviceListContainer" class="space-y-2 overflow-y-auto custom-scrollbar flex-1 pr-2">
                    <div class="text-center py-8 text-slate-500">
                        <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
                        <p class="text-sm">加载中...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 设备详情弹窗 -->
<div id="deviceInfoWindow" class="fixed inset-0 z-40 hidden pointer-events-none">
    <div class="absolute top-4 right-4 w-80 bg-slate-800 rounded-2xl border border-slate-700 shadow-2xl pointer-events-auto overflow-hidden">
        <div class="p-5">
            <div class="flex items-start justify-between mb-4">
                <div class="flex items-center gap-3">
                    <div id="infoDeviceIcon" class="w-12 h-12 rounded-xl bg-blue-500/20 flex items-center justify-center">
                        <i class="fas fa-microchip text-xl text-blue-400"></i>
                    </div>
                    <div>
                        <h4 id="infoDeviceName" class="font-semibold text-white">--</h4>
                        <p id="infoDeviceType" class="text-xs text-slate-400">--</p>
                    </div>
                </div>
                <button onclick="mapV2.closeInfoWindow()" class="p-1.5 hover:bg-slate-700 rounded-lg transition-colors">
                    <i class="fas fa-times text-slate-400"></i>
                </button>
            </div>
            
            <div class="space-y-3">
                <div class="flex items-center justify-between py-2 border-b border-slate-700">
                    <span class="text-sm text-slate-400">状态</span>
                    <span id="infoDeviceStatus" class="text-sm font-medium">--</span>
                </div>
                
                <div class="flex items-center justify-between py-2 border-b border-slate-700">
                    <span class="text-sm text-slate-400">最新值</span>
                    <span id="infoDeviceValue" class="font-mono text-sm font-medium">--</span>
                </div>
                
                <div class="flex items-center justify-between py-2 border-b border-slate-700">
                    <span class="text-sm text-slate-400">更新时间</span>
                    <span id="infoDeviceTime" class="text-sm text-slate-400">--</span>
                </div>
                
                <div class="grid grid-cols-2 gap-2 pt-2">
                    <a href="#" id="infoDetailLink" class="block text-center py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors text-sm">
                        查看详情
                    </a>
                    <a href="#" id="infoDataLink" class="block text-center py-2 bg-slate-700 text-white rounded-lg hover:bg-slate-600 transition-colors text-sm">
                        数据查看
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="//api.map.baidu.com/api?v=3.0&ak={{ baidu_map_ak }}"></script>
<script src="{{ url_for('static', filename='js/v2/map.js') }}"></script>
{% endblock %}
