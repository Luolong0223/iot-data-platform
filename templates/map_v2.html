{% extends "base_v2.html" %}

{% block title %}地图展示 - IoT数据平台{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<style>
    .map-page { height: calc(100vh - 130px); }
    #mapContainer { width: 100%; height: 100%; border-radius: 12px; }
    .leaflet-container { background: #1e293b; }
    .device-marker-online { color: #10b981; }
    .device-marker-offline { color: #64748b; }
    .device-marker-alarm { color: #ef4444; }
    .map-popup .popup-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .map-popup .popup-row { font-size: 12px; color: #64748b; margin-bottom: 2px; }
    .map-popup .popup-value { color: #e2e8f0; }
    .map-legend { background: rgba(15,23,42,0.9); border: 1px solid #334155; border-radius: 8px; padding: 10px 14px; }
    .map-legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
    .map-legend-dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
{% endblock %}

{% block content %}
<div class="map-page">
    <!-- 顶部工具栏 -->
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <div class="d-flex align-items-center gap-2 flex-wrap">
            <select id="deviceFilter" class="form-select form-select-sm" style="width:auto;background:rgba(30,41,59,0.8);color:#e2e8f0;border-color:#334155;">
                <option value="">全部设备</option>
                <option value="online">在线设备</option>
                <option value="offline">离线设备</option>
                <option value="alarm">告警设备</option>
            </select>
            <label class="d-flex align-items-center gap-2 px-3 py-1 rounded" style="background:rgba(30,41,59,0.8);border:1px solid #334155;cursor:pointer;font-size:13px;color:#94a3b8;">
                <input type="checkbox" id="showHeatmap" class="form-check-input m-0" style="width:14px;height:14px;">
                热力图
            </label>
        </div>
        <div class="d-flex gap-2">
            <button onclick="mapV2.refreshDevices()" class="btn btn-sm" style="background:#334155;color:#e2e8f0;">
                <i class="bi bi-arrow-repeat me-1"></i>刷新
            </button>
            <button onclick="mapV2.fitAllMarkers()" class="btn btn-sm" style="background:#334155;color:#e2e8f0;">
                <i class="bi bi-arrows-fullscreen me-1"></i>适应视图
            </button>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="row g-3" style="height:calc(100% - 50px);">
        <!-- 地图区域 -->
        <div class="col-lg-9" style="height:100%;">
            <div class="position-relative rounded-3 overflow-hidden border" style="height:100%;background:#1e293b;border-color:#334155 !important;">
                <div id="mapContainer"></div>
                <div id="mapLoading" class="position-absolute top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center" style="background:rgba(15,23,42,0.9);z-index:1000;">
                    <div class="text-center">
                        <div class="spinner-border text-primary mb-2" role="status"></div>
                        <p class="text-secondary mb-0 small">地图加载中...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧面板 -->
        <div class="col-lg-3 d-flex flex-column gap-3" style="height:100%;overflow-y:auto;">
            <!-- 设备统计 -->
            <div class="card border-0" style="background:rgba(30,41,59,0.5);backdrop-filter:blur(10px);">
                <div class="card-body p-3">
                    <h6 class="text-white mb-3"><i class="bi bi-pie-chart text-primary me-2"></i>设备统计</h6>
                    <div class="d-flex justify-content-between align-items-center p-2 rounded mb-2" style="background:rgba(15,23,42,0.6);">
                        <div class="d-flex align-items-center gap-2">
                            <span class="rounded-circle d-inline-block" style="width:10px;height:10px;background:#10b981;"></span>
                            <span class="small text-secondary">在线设备</span>
                        </div>
                        <span id="onlineCount" class="fw-bold" style="color:#10b981;">0</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center p-2 rounded mb-2" style="background:rgba(15,23,42,0.6);">
                        <div class="d-flex align-items-center gap-2">
                            <span class="rounded-circle d-inline-block" style="width:10px;height:10px;background:#64748b;"></span>
                            <span class="small text-secondary">离线设备</span>
                        </div>
                        <span id="offlineCount" class="fw-bold text-secondary">0</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center p-2 rounded" style="background:rgba(15,23,42,0.6);">
                        <div class="d-flex align-items-center gap-2">
                            <span class="rounded-circle d-inline-block" style="width:10px;height:10px;background:#ef4444;"></span>
                            <span class="small text-secondary">告警设备</span>
                        </div>
                        <span id="alarmCount" class="fw-bold" style="color:#ef4444;">0</span>
                    </div>
                </div>
            </div>

            <!-- 设备列表 -->
            <div class="card border-0 flex-grow-1" style="background:rgba(30,41,59,0.5);backdrop-filter:blur(10px);overflow:hidden;">
                <div class="card-body p-3 d-flex flex-column" style="height:100%;">
                    <h6 class="text-white mb-3"><i class="bi bi-list-ul text-success me-2"></i>设备列表</h6>
                    <div id="deviceListContainer" class="flex-grow-1 overflow-auto" style="max-height:350px;">
                        <div class="text-center py-4 text-secondary">
                            <div class="spinner-border spinner-border-sm mb-2" role="status"></div>
                            <p class="small mb-0">加载中...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 设备详情弹窗 -->
    <div id="deviceInfoPanel" class="position-fixed" style="display:none;right:20px;bottom:20px;z-index:1001;width:300px;">
        <div class="card border-0 shadow-lg" style="background:rgba(15,23,42,0.95);backdrop-filter:blur(20px);border:1px solid #334155;">
            <div class="card-header d-flex justify-content-between align-items-center py-2 px-3" style="background:transparent;border-bottom:1px solid #334155;">
                <span class="fw-semibold text-white small" id="infoDeviceName">设备详情</span>
                <button class="btn-close btn-close-white" style="font-size:10px;" onclick="document.getElementById('deviceInfoPanel').style.display='none'"></button>
            </div>
            <div class="card-body p-3">
                <div class="d-flex justify-content-between py-1 border-bottom border-secondary" style="border-color:#1e293b !important;">
                    <span class="small text-secondary">状态</span>
                    <span id="infoDeviceStatus" class="small fw-medium">--</span>
                </div>
                <div class="d-flex justify-content-between py-1 border-bottom border-secondary" style="border-color:#1e293b !important;">
                    <span class="small text-secondary">最新值</span>
                    <span id="infoDeviceValue" class="small fw-medium font-monospace">--</span>
                </div>
                <div class="d-flex justify-content-between py-1 border-bottom border-secondary" style="border-color:#1e293b !important;">
                    <span class="small text-secondary">更新时间</span>
                    <span id="infoDeviceTime" class="small text-secondary">--</span>
                </div>
                <div class="d-flex gap-2 mt-2">
                    <a href="#" id="infoDetailLink" class="btn btn-sm flex-grow-1 text-white" style="background:#3b82f6;">查看详情</a>
                    <a href="#" id="infoDataLink" class="btn btn-sm flex-grow-1 text-white" style="background:#475569;">数据查看</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script src="{{ url_for('static', filename='js/v2/map.js') }}"></script>
{% endblock %}
