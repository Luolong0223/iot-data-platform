{% extends "base_v2.html" %}
{% block title %}数据查看 - 遵义流量计采集测试{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <!-- 筛选条件 -->
    <div class="card mb-3">
        <div class="card-body">
            <div class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label small text-muted">设备</label>
                    <select class="form-select bg-secondary text-light border-0" id="filterDevice">
                        <option value="">全部设备</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small text-muted">通道</label>
                    <select class="form-select bg-secondary text-light border-0" id="filterChannel">
                        <option value="">全部通道</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small text-muted">数据点</label>
                    <select class="form-select bg-secondary text-light border-0" id="filterDataPoint">
                        <option value="">全部数据点</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small text-muted">时间范围</label>
                    <select class="form-select bg-secondary text-light border-0" id="filterTimeRange">
                        <option value="1">最近 1 小时</option>
                        <option value="6">最近 6 小时</option>
                        <option value="24" selected>最近 24 小时</option>
                        <option value="168">最近 7 天</option>
                        <option value="720">最近 30 天</option>
                        <option value="custom">自定义</option>
                    </select>
                </div>
                <div class="col-12" id="customTimeRange" style="display:none;">
                    <div class="row g-2">
                        <div class="col-md-3">
                            <input type="datetime-local" class="form-control bg-secondary text-light border-0" id="filterStartTime">
                        </div>
                        <div class="col-md-3">
                            <input type="datetime-local" class="form-control bg-secondary text-light border-0" id="filterEndTime">
                        </div>
                    </div>
                </div>
                <div class="col-12">
                    <button class="btn btn-primary btn-sm" id="applyFilterBtn">
                        <i class="bi bi-funnel"></i> 应用筛选
                    </button>
                    <button class="btn btn-outline-light btn-sm" id="resetFilterBtn">
                        <i class="bi bi-x-circle"></i> 重置
                    </button>
                    <button class="btn btn-success btn-sm" id="exportDataBtn">
                        <i class="bi bi-download"></i> 导出 CSV
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 图表 -->
    <div class="card mb-3">
        <div class="card-header"><i class="bi bi-graph-up"></i> 趋势图</div>
        <div class="card-body">
            <div id="chartContainer" style="height: 350px;">
                <div class="text-center text-muted py-5">请选择设备、通道和数据点后查看趋势</div>
            </div>
        </div>
    </div>

    <!-- 数据列表 -->
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span><i class="bi bi-table"></i> 数据列表 <span class="badge bg-secondary" id="dataTotal">0</span></span>
            <button class="btn btn-sm btn-outline-danger" id="cleanupBtn" title="清理旧数据">
                <i class="bi bi-trash"></i> 清理
            </button>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark table-hover mb-0">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>设备</th>
                            <th>通道</th>
                            <th>数据点</th>
                            <th>值</th>
                            <th>单位</th>
                            <th width="100">操作</th>
                        </tr>
                    </thead>
                    <tbody id="dataListTbody">
                        <tr><td colspan="7" class="text-center text-muted py-4">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer">
            <nav>
                <ul class="pagination pagination-sm justify-content-center mb-0" id="pagination"></ul>
            </nav>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script src="{{ url_for('static', filename='js/v2/data_view.js') }}"></script>
{% endblock %}
