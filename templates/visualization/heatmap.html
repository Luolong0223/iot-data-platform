{% extends "base.html" %}
{% block title %}数据点热力图 - IoT 数据平台{% endblock %}
{% block content %}
<div class="container-fluid py-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0"><i class="bi bi-grid-3x3-gap-fill me-2"></i>数据热力图</h4>
        <div class="btn-group">
            <button class="btn btn-primary btn-sm active" data-type="points" onclick="switchType('points')">
                <i class="bi bi-thermometer-half me-1"></i>数据点活跃度
            </button>
            <button class="btn btn-outline-primary btn-sm" data-type="devices" onclick="switchType('devices')">
                <i class="bi bi-cpu me-1"></i>设备活跃度
            </button>
        </div>
    </div>

    <div id="pointsPanel">
        <div class="card glass-card mb-3">
            <div class="card-body">
                <div class="d-flex gap-2 align-items-center">
                    <span class="small text-muted">时间范围：</span>
                    <select class="form-select form-select-sm" style="width: 120px;" id="pointPeriod" onchange="loadPointHeat()">
                        <option value="24h" selected>最近 24 小时</option>
                        <option value="7d">最近 7 天</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="card glass-card">
            <div class="card-body p-0">
                <div id="pointHeatChart" style="width: 100%; height: 70vh; min-height: 500px;"></div>
            </div>
        </div>
    </div>

    <div id="devicesPanel" style="display:none;">
        <div class="card glass-card mb-3">
            <div class="card-body">
                <div class="d-flex gap-2 align-items-center">
                    <span class="small text-muted">日期范围：</span>
                    <select class="form-select form-select-sm" style="width: 120px;" id="deviceDays" onchange="loadDeviceHeat()">
                        <option value="7" selected>最近 7 天</option>
                        <option value="14">最近 14 天</option>
                        <option value="30">最近 30 天</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="card glass-card">
            <div class="card-body p-0">
                <div id="deviceHeatChart" style="width: 100%; height: 70vh; min-height: 500px;"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script>
let pointChart, deviceChart;

function initCharts() {
    pointChart = echarts.init(document.getElementById('pointHeatChart'));
    deviceChart = echarts.init(document.getElementById('deviceHeatChart'));
    window.addEventListener('resize', () => { pointChart.resize(); deviceChart.resize(); });
}

function switchType(type) {
    document.querySelectorAll('[data-type]').forEach(b => {
        b.classList.remove('btn-primary', 'active');
        b.classList.add('btn-outline-primary');
    });
    document.querySelector(`[data-type="${type}"]`).classList.add('btn-primary', 'active');
    document.querySelector(`[data-type="${type}"]`).classList.remove('btn-outline-primary');
    document.getElementById('pointsPanel').style.display = type === 'points' ? '' : 'none';
    document.getElementById('devicesPanel').style.display = type === 'devices' ? '' : 'none';
    if (type === 'points') loadPointHeat(); else loadDeviceHeat();
}

function loadPointHeat() {
    const period = document.getElementById('pointPeriod').value;
    fetch('/api/viz/api/heatmap/points?period=' + period).then(r => r.json()).then(res => {
        if (!res.success) return;
        const data = res.data;
        const hours = Array.from({length: 24}, (_, i) => i + '时');
        pointChart.setOption({
            tooltip: { position: 'top' },
            grid: { left: 100, right: 30, top: 30, bottom: 30 },
            xAxis: { type: 'category', data: hours, splitArea: { show: true } },
            yAxis: { type: 'category', data: data.points, splitArea: { show: true } },
            visualMap: {
                min: 0,
                max: Math.max(...data.data.flat(), 1),
                calculable: true,
                orient: 'horizontal',
                left: 'center',
                bottom: 0,
                inRange: { color: ['#f0f9ff', '#67c23a', '#e6a23c', '#f56c6c'] }
            },
            series: [{
                name: '数据点',
                type: 'heatmap',
                data: data.data.flatMap((row, yi) => row.map((v, xi) => [xi, yi, v])),
                label: { show: false },
                emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0, 0, 0, 0.5)' } }
            }]
        });
    });
}

function loadDeviceHeat() {
    const days = document.getElementById('deviceDays').value;
    fetch('/api/viz/api/heatmap/devices?days=' + days).then(r => r.json()).then(res => {
        if (!res.success) return;
        const data = res.data;
        const hours = Array.from({length: 24}, (_, i) => i + '时');
        deviceChart.setOption({
            tooltip: { position: 'top' },
            grid: { left: 100, right: 30, top: 30, bottom: 30 },
            xAxis: { type: 'category', data: hours, splitArea: { show: true } },
            yAxis: { type: 'category', data: data.days, splitArea: { show: true } },
            visualMap: {
                min: 0,
                max: Math.max(...data.data.flat(), 1),
                calculable: true,
                orient: 'horizontal',
                left: 'center',
                bottom: 0,
                inRange: { color: ['#fff', '#ffd666', '#ff7a45', '#cf1322'] }
            },
            series: [{
                name: '设备',
                type: 'heatmap',
                data: data.data.flatMap((row, yi) => row.map((v, xi) => [xi, yi, v])),
                label: { show: false },
                emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0, 0, 0, 0.5)' } }
            }]
        });
    });
}

document.addEventListener('DOMContentLoaded', function() {
    initCharts();
    loadPointHeat();
});
</script>
{% endblock %}
