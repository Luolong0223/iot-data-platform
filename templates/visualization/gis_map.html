{% extends "base.html" %}
{% block title %}GIS 地图 - IoT 数据平台{% endblock %}
{% block content %}
<div class="container-fluid p-0">
    <div id="mapContainer" style="width: 100%; height: calc(100vh - 56px);"></div>

    <div class="card position-absolute" style="top: 70px; right: 20px; width: 280px; z-index: 100;">
        <div class="card-body">
            <h6 class="mb-3"><i class="bi bi-funnel me-1"></i>筛选</h6>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="showOnline" checked onchange="refreshMarkers()">
                <label class="form-check-label" for="showOnline">在线设备</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="showOffline" checked onchange="refreshMarkers()">
                <label class="form-check-label" for="showOffline">离线设备</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="showAlarm" checked onchange="refreshMarkers()">
                <label class="form-check-label" for="showAlarm">告警设备</label>
            </div>
            <hr>
            <h6 class="mb-2"><i class="bi bi-circle-fill text-success me-1"></i>图例</h6>
            <div class="small text-muted">
                <i class="bi bi-record-circle-fill text-success"></i> 在线<br>
                <i class="bi bi-record-circle-fill text-secondary"></i> 离线<br>
                <i class="bi bi-record-circle-fill text-danger"></i> 告警
            </div>
            <hr>
            <h6 class="mb-2">统计</h6>
            <div class="small">
                <div>设备总数：<strong id="mapTotal">0</strong></div>
                <div>在线：<strong class="text-success" id="mapOnline">0</strong></div>
                <div>离线：<strong class="text-secondary" id="mapOffline">0</strong></div>
                <div>告警：<strong class="text-danger" id="mapAlarm">0</strong></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
<script>
let map;
let allDevices = [];
let markerGroup;

function initMap() {
    map = L.map('mapContainer').setView([35.0, 105.0], 4);
    L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
        subdomains: ['1', '2', '3', '4'],
        attribution: '高德地图'
    }).addTo(map);
    markerGroup = L.layerGroup().addTo(map);
}

function loadDevices() {
    fetch('/api/viz/api/map/devices').then(r => r.json()).then(res => {
        if (!res.success) return;
        allDevices = res.data.devices;
        updateStats(res.data.stats);
        refreshMarkers();
        if (res.data.center) map.setView([res.data.center[1], res.data.center[0]], res.data.zoom);
    });
}

function updateStats(stats) {
    document.getElementById('mapTotal').textContent = stats.total;
    document.getElementById('mapOnline').textContent = stats.online;
    document.getElementById('mapOffline').textContent = stats.offline;
    document.getElementById('mapAlarm').textContent = stats.alarm;
}

function refreshMarkers() {
    markerGroup.clearLayers();
    const showOnline = document.getElementById('showOnline').checked;
    const showOffline = document.getElementById('showOffline').checked;
    const showAlarm = document.getElementById('showAlarm').checked;
    allDevices.forEach(d => {
        if (!d.longitude || !d.latitude) return;
        if (d.is_online && !showOnline) return;
        if (!d.is_online && !showOffline) return;
        if (d.has_alarm && !showAlarm) return;

        const color = d.has_alarm ? 'red' : (d.is_online ? 'green' : 'gray');
        const icon = L.divIcon({
            html: `<i class="bi bi-record-circle-fill" style="color: ${color}; font-size: 24px;"></i>`,
            iconSize: [24, 24],
            className: 'device-marker'
        });
        const marker = L.marker([d.latitude, d.longitude], { icon })
            .bindPopup(`<b>${d.name}</b><br/>${d.location_name || '未设置'}<br/>` +
                       `状态: ${d.is_online ? '在线' : '离线'}<br/>` +
                       `最后活跃: ${d.last_seen_at || '从未'}`);
        markerGroup.addLayer(marker);
    });
}

document.addEventListener('DOMContentLoaded', function() {
    initMap();
    loadDevices();
    setInterval(loadDevices, 30000);
});
</script>
{% endblock %}
