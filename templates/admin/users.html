{% extends "base_v2.html" %}
{% block title %}用户管理 - IoT数据平台{% endblock %}
{% block content %}
<div class="container-fluid py-4">
    <h3><i class="bi bi-people"></i> 用户管理</h3>
    <p class="text-muted">通过 API 管理用户: <code>/api/admin/users</code></p>
    <div id="userList">加载中...</div>
</div>
{% endblock %}
{% block scripts %}
<script>
(async () => {
    const r = await apiRequest('/api/admin/users');
    const el = document.getElementById('userList');
    if (!r.success) { el.innerHTML = '<div class="alert alert-danger">加载失败</div>'; return; }
    el.innerHTML = `<table class="table table-dark table-hover">
        <thead><tr><th>ID</th><th>用户名</th><th>邮箱</th><th>管理员</th><th>状态</th><th>创建时间</th></tr></thead>
        <tbody>${(r.data||[]).map(u => `<tr>
            <td>${u.id}</td><td>${u.username}</td><td>${u.email||''}</td>
            <td>${u.is_admin?'是':'否'}</td><td>${u.is_active?'启用':'禁用'}</td>
            <td>${u.created_at||''}</td>
        </tr>`).join('')}</tbody></table>`;
})();
</script>
{% endblock %}
