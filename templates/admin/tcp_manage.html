{% extends "base_v2.html" %}
{% block title %}TCP管理 - IoT数据平台{% endblock %}
{% block content %}
<div class="container-fluid py-4">
    <h3><i class="bi bi-broadcast"></i> TCP 监听管理</h3>
    <p class="text-muted">通过 API 管理 TCP 端口: <code>/api/tcp/*</code></p>
    <div id="tcpList">加载中...</div>
</div>
{% endblock %}
{% block scripts %}
<script>
(async () => {
    const r = await apiRequest('/api/tcp/config');
    const el = document.getElementById('tcpList');
    if (!r.success) { el.innerHTML = '<div class="alert alert-danger">加载失败</div>'; return; }
    el.innerHTML = `<table class="table table-dark table-hover">
        <thead><tr><th>ID</th><th>名称</th><th>主机</th><th>端口</th><th>启用</th><th>状态</th></tr></thead>
        <tbody>${(r.data||[]).map(p => `<tr>
            <td>${p.id}</td><td>${p.name||''}</td><td>${p.host||''}</td>
            <td>${p.port||''}</td>
            <td>${p.enabled?'是':'否'}</td><td>${p.status||''}</td>
        </tr>`).join('')}</tbody></table>`;
})();
</script>
{% endblock %}
