{% extends "admin/base_admin.html" %}

{% block title %}TCP 管理{% endblock %}

{% block content %}
<div class="fade-in">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0"><i class="bi bi-ethernet"></i> TCP 服务器管理</h4>
        <button class="btn btn-outline-primary" onclick="refreshTcpStatus()">
            <i class="bi bi-arrow-clockwise"></i> 刷新状态
        </button>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card stat-card">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="stat-icon"><i class="bi bi-hdd-network"></i></div>
                    <div>
                        <div class="stat-value" id="tcpStatus">-</div>
                        <div class="stat-label">服务器状态</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card success">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="stat-icon"><i class="bi bi-plug"></i></div>
                    <div>
                        <div class="stat-value" id="tcpBasePort">-</div>
                        <div class="stat-label">基础端口</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card warning">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="stat-icon"><i class="bi bi-people"></i></div>
                    <div>
                        <div class="stat-value" id="tcpUserCount">-</div>
                        <div class="stat-label">已分配端口用户</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <i class="bi bi-list-ol"></i> 端口分配情况
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover" id="tcpTable">
                    <thead>
                        <tr>
                            <th>用户ID</th>
                            <th>用户名</th>
                            <th>TCP 端口</th>
                            <th>存储状态</th>
                            <th>设备数</th>
                        </tr>
                    </thead>
                    <tbody id="tcpTableBody">
                        <tr><td colspan="5" class="text-center text-muted py-4">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/admin.js') }}"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    refreshTcpStatus();
});
</script>
{% endblock %}
