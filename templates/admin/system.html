{% extends "base_v2.html" %}
{% block title %}系统设置 - 遵义流量计采集测试{% endblock %}
{% block content %}
<div class="container-fluid py-4">
    <h3><i class="bi bi-gear"></i> 系统设置</h3>
    <p class="text-muted">系统配置和登录日志: <code>/api/admin/system-config</code>, <code>/api/admin/login-logs</code></p>
    <div id="sysInfo">加载中...</div>
</div>
{% endblock %}
{% block scripts %}
<script>
(async () => {
    const [cfg, logs] = await Promise.all([
        apiRequest('/api/admin/system-config').catch(() => ({success:false,data:[]})),
        apiRequest('/api/admin/login-logs').catch(() => ({success:false,data:[]}))
    ]);
    const el = document.getElementById('sysInfo');
    let html = '<h5>系统配置</h5>';
    if (cfg.success && cfg.data && cfg.data.length) {
        html += '<table class="table table-dark table-hover"><thead><tr><th>键</th><th>值</th><th>说明</th></tr></thead><tbody>';
        cfg.data.forEach(c => {
            html += `<tr><td>${c.key||''}</td><td><code>${c.value||''}</code></td><td>${c.description||''}</td></tr>`;
        });
        html += '</tbody></table>';
    } else { html += '<p class="text-muted">无配置项</p>'; }
    html += '<h5 class="mt-4">登录日志 (最近 50 条)</h5>';
    if (logs.success && logs.data && logs.data.length) {
        html += '<table class="table table-dark table-sm table-hover"><thead><tr><th>ID</th><th>用户</th><th>IP</th><th>状态</th><th>时间</th></tr></thead><tbody>';
        logs.data.forEach(l => {
            html += `<tr><td>${l.id}</td><td>${l.username||''}</td><td>${l.ip||''}</td>
                <td><span class="text-${l.status==='success'?'success':'danger'}">${l.status||''}</span></td>
                <td>${l.timestamp||''}</td></tr>`;
        });
        html += '</tbody></table>';
    } else { html += '<p class="text-muted">无登录日志</p>'; }
    el.innerHTML = html;
})();
</script>
{% endblock %}
