{% extends "base_v2.html" %}
{% block title %}设备管理 - IoT数据平台{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row g-3">
        <!-- 左侧分类树 -->
        <div class="col-md-3">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-diagram-3"></i> 设备分类</span>
                    <button class="btn btn-sm btn-primary" id="addCategoryBtn" title="新建根分类">
                        <i class="bi bi-plus-lg"></i>
                    </button>
                </div>
                <div class="card-body p-2">
                    <div class="mb-2">
                        <input type="text" class="form-control form-control-sm bg-secondary text-light border-0" id="searchCategoryInput" placeholder="搜索分类...">
                    </div>
                    <div id="categoryTree" class="category-tree">
                        <div class="text-center text-muted py-3">加载中...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧设备列表 -->
        <div class="col-md-9">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <div>
                        <i class="bi bi-hdd-rack"></i>
                        <span id="deviceListTitle">所有设备</span>
                        <span class="badge bg-secondary ms-2" id="deviceCount">0</span>
                    </div>
                    <div>
                        <input type="text" class="form-control form-control-sm d-inline-block w-auto" id="searchDeviceInput" placeholder="搜索设备...">
                    </div>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-dark table-hover mb-0">
                            <thead>
                                <tr>
                                    <th width="60">状态</th>
                                    <th>设备名称</th>
                                    <th>自定义名</th>
                                    <th>分类</th>
                                    <th>电压(mV)</th>
                                    <th>通道</th>
                                    <th>最后更新</th>
                                    <th width="200">操作</th>
                                </tr>
                            </thead>
                            <tbody id="deviceListTbody">
                                <tr><td colspan="8" class="text-center text-muted py-4">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 设备详情 Modal -->
<div class="modal fade" id="deviceDetailModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content bg-dark text-light">
            <div class="modal-header border-secondary">
                <h5 class="modal-title"><i class="bi bi-hdd-rack"></i> 设备详情: <span id="detailDeviceName"></span></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="deviceDetailBody">加载中...</div>
        </div>
    </div>
</div>

<!-- 编辑设备 Modal -->
<div class="modal fade" id="editDeviceModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-light">
            <div class="modal-header border-secondary">
                <h5 class="modal-title"><i class="bi bi-pencil"></i> 编辑设备</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editDeviceForm">
                    <input type="hidden" id="editDeviceId">
                    <div class="mb-3">
                        <label class="form-label">设备原名</label>
                        <input type="text" class="form-control bg-secondary text-light border-0" id="editDeviceOriginalName" readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">自定义名(用于显示)</label>
                        <input type="text" class="form-control bg-secondary text-light border-0" id="editDeviceCustomName" placeholder="留空则使用原名">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">分类</label>
                        <select class="form-select bg-secondary text-light border-0" id="editDeviceCategory">
                            <option value="">-- 未分类 --</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">备注</label>
                        <textarea class="form-control bg-secondary text-light border-0" id="editDeviceDescription" rows="2"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="saveEditDeviceBtn">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- 分类编辑 Modal -->
<div class="modal fade" id="categoryModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-light">
            <div class="modal-header border-secondary">
                <h5 class="modal-title" id="categoryModalTitle">新建分类</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="categoryForm">
                    <input type="hidden" id="categoryId">
                    <input type="hidden" id="categoryParentId">
                    <div class="mb-3">
                        <label class="form-label">分类名 *</label>
                        <input type="text" class="form-control bg-secondary text-light border-0" id="categoryName" placeholder="如:车间A/产线1/温度传感器" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">父分类</label>
                        <select class="form-select bg-secondary text-light border-0" id="categoryParentSelect">
                            <option value="">-- 根分类 --</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">备注</label>
                        <textarea class="form-control bg-secondary text-light border-0" id="categoryDescription" rows="2"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="saveCategoryBtn">保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/v2/devices.js') }}"></script>
{% endblock %}
