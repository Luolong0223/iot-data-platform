{% extends "base.html" %}
{% block title %}角色权限管理 · IoT 平台{% endblock %}
{% block content %}
<div class="container-fluid py-3">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="mb-0"><i class="bi bi-shield-lock"></i> 角色权限管理 (RBAC)</h3>
    <div>
      <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#roleModal" onclick="openCreateRoleModal()">
        <i class="bi bi-plus-circle"></i> 新建角色
      </button>
    </div>
  </div>

  <ul class="nav nav-tabs mb-3" id="rbacTab" role="tablist">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#rolesPane"><i class="bi bi-person-badge"></i> 角色</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#permsPane"><i class="bi bi-key"></i> 权限定义</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#usersPane"><i class="bi bi-people"></i> 用户分配</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#myPane"><i class="bi bi-person-check"></i> 我的权限</button></li>
  </ul>

  <div class="tab-content">
    <!-- 角色列表 -->
    <div class="tab-pane fade show active" id="rolesPane">
      <div class="row g-3" id="rolesList"><div class="text-muted p-3">加载中...</div></div>
    </div>

    <!-- 权限定义 -->
    <div class="tab-pane fade" id="permsPane">
      <div class="card">
        <div class="card-body">
          <table class="table table-sm table-hover" id="permTable">
            <thead><tr><th>代码</th><th>名称</th><th>资源</th><th>操作</th><th>描述</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 用户分配 -->
    <div class="tab-pane fade" id="usersPane">
      <div class="card">
        <div class="card-body">
          <table class="table table-sm table-hover">
            <thead><tr><th>ID</th><th>用户名</th><th>角色</th><th>权限数</th><th>最后登录</th><th>操作</th></tr></thead>
            <tbody id="usersTbody"><tr><td colspan="6" class="text-muted text-center py-3">加载中...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 我的权限 -->
    <div class="tab-pane fade" id="myPane">
      <div class="card">
        <div class="card-body">
          <h6>当前用户拥有的权限代码：</h6>
          <div id="myPerms" class="d-flex flex-wrap gap-2"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 角色编辑/创建模态框 -->
<div class="modal fade" id="roleModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="roleModalTitle">新建角色</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="roleForm">
          <input type="hidden" id="roleId" />
          <div class="row g-2 mb-3">
            <div class="col-md-6">
              <label class="form-label">角色代码 <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="roleCode" required pattern="[a-z][a-z0-9_]*" />
              <small class="text-muted">小写字母/数字/下划线，admin/operator/viewer 为系统保留</small>
            </div>
            <div class="col-md-6">
              <label class="form-label">角色名称 <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="roleName" required />
            </div>
            <div class="col-12">
              <label class="form-label">描述</label>
              <input type="text" class="form-control" id="roleDesc" />
            </div>
          </div>
          <h6>分配权限</h6>
          <div id="permCheckboxes" class="row g-2"></div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-primary" onclick="saveRole()">保存</button>
      </div>
    </div>
  </div>
</div>

<!-- 分配角色给用户 -->
<div class="modal fade" id="assignRoleModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">分配角色</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <p>为用户 <strong id="assignUsername"></strong> 分配角色：</p>
        <div id="assignRoleList"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
      </div>
    </div>
  </div>
</div>

<script>
let ALL_PERMS = [];
let ALL_ROLES = [];

async function api(path, opts={}) {
  const r = await fetch(path, Object.assign({headers:{'Content-Type':'application/json'}, credentials:'same-origin'}, opts));
  const j = await r.json();
  if (!r.ok || j.success === false) throw new Error(j.msg || ('HTTP '+r.status));
  return j.data;
}

async function loadAll() {
  await Promise.all([loadRoles(), loadPerms(), loadMyPerms(), loadUsers()]);
}

async function loadRoles() {
  try {
    const roles = await api('/api/rbac/roles');
    ALL_ROLES = roles;
    const c = document.getElementById('rolesList');
    if (!roles.length) { c.innerHTML = '<div class="text-muted p-3">暂无角色</div>'; return; }
    c.innerHTML = roles.map(r => `
      <div class="col-md-4">
        <div class="card h-100">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start">
              <h5 class="mb-1">${r.name} ${r.is_system?'<span class="badge bg-secondary">系统</span>':''}</h5>
              <span class="badge bg-primary">${r.code}</span>
            </div>
            <p class="text-muted small">${r.description||''}</p>
            <p class="small">权限：<span class="badge bg-info">${(r.permissions||[]).length}</span></p>
            <div class="d-flex gap-1 flex-wrap mb-2">
              ${(r.permissions||[]).slice(0,6).map(p=>`<span class="badge bg-light text-dark border">${p.code}</span>`).join('')}
              ${(r.permissions||[]).length>6?`<span class="badge bg-light text-muted">+${(r.permissions||[]).length-6}</span>`:''}
            </div>
            <div class="d-flex gap-2">
              <button class="btn btn-sm btn-outline-primary" onclick='openEditRoleModal(${JSON.stringify(r).replace(/'/g,"&#39;")})'>
                <i class="bi bi-pencil"></i> 编辑
              </button>
              ${r.is_system?'':`<button class="btn btn-sm btn-outline-danger" onclick="deleteRole(${r.id},'${r.name}')">
                <i class="bi bi-trash"></i> 删除
              </button>`}
            </div>
          </div>
        </div>
      </div>
    `).join('');
  } catch(e) { document.getElementById('rolesList').innerHTML = '<div class="text-danger p-3">'+e.message+'</div>'; }
}

async function loadPerms() {
  try {
    const perms = await api('/api/rbac/permissions');
    ALL_PERMS = perms;
    const grouped = {};
    perms.forEach(p => { (grouped[p.resource] = grouped[p.resource] || []).push(p); });
    let html = '';
    for (const [res, list] of Object.entries(grouped)) {
      html += `<tr><td colspan="5" class="table-secondary"><strong>${res}</strong></td></tr>`;
      list.forEach(p => {
        html += `<tr><td><code>${p.code}</code></td><td>${p.name}</td><td><span class="badge bg-secondary">${p.resource}</span></td><td>${p.action}</td><td class="small text-muted">${p.description||''}</td></tr>`;
      });
    }
    document.querySelector('#permTable tbody').innerHTML = html;
  } catch(e) { console.error(e); }
}

async function loadMyPerms() {
  try {
    const perms = await api('/api/rbac/my-permissions');
    const c = document.getElementById('myPerms');
    if (!perms.length) { c.innerHTML = '<span class="text-muted">无</span>'; return; }
    c.innerHTML = perms.map(p=>`<span class="badge bg-success">${p}</span>`).join('');
  } catch(e) { console.error(e); }
}

async function loadUsers() {
  try {
    const users = await api('/api/rbac/users');
    const tb = document.getElementById('usersTbody');
    if (!users.length) { tb.innerHTML = '<tr><td colspan="6" class="text-muted text-center py-3">暂无用户</td></tr>'; return; }
    tb.innerHTML = users.map(u => `
      <tr>
        <td>${u.id}</td>
        <td>${u.username} ${u.is_admin?'<span class="badge bg-warning text-dark">超管</span>':''}</td>
        <td>${(u.roles||[]).map(r=>`<span class="badge bg-primary me-1">${r.name}</span>`).join('')||'<span class="text-muted">无</span>'}</td>
        <td><span class="badge bg-info">${u.permission_count||0}</span></td>
        <td class="small text-muted">${u.last_login_at||'从未'}</td>
        <td><button class="btn btn-sm btn-outline-primary" onclick='openAssignRoleModal(${u.id}, "${u.username}")'>
          <i class="bi bi-person-plus"></i> 分配
        </button></td>
      </tr>
    `).join('');
  } catch(e) { tb.innerHTML = '<tr><td colspan="6" class="text-danger text-center py-3">'+e.message+'</td></tr>'; }
}

function openCreateRoleModal() {
  document.getElementById('roleId').value = '';
  document.getElementById('roleCode').value = '';
  document.getElementById('roleCode').disabled = false;
  document.getElementById('roleName').value = '';
  document.getElementById('roleDesc').value = '';
  document.getElementById('roleModalTitle').textContent = '新建角色';
  renderPermCheckboxes([]);
}
function openEditRoleModal(role) {
  document.getElementById('roleId').value = role.id;
  document.getElementById('roleCode').value = role.code;
  document.getElementById('roleCode').disabled = true;
  document.getElementById('roleName').value = role.name;
  document.getElementById('roleDesc').value = role.description||'';
  document.getElementById('roleModalTitle').textContent = '编辑角色：'+role.name;
  const selected = (role.permissions||[]).map(p=>p.code);
  renderPermCheckboxes(selected);
  new bootstrap.Modal(document.getElementById('roleModal')).show();
}
function renderPermCheckboxes(selected) {
  const grouped = {};
  ALL_PERMS.forEach(p => { (grouped[p.resource] = grouped[p.resource]||[]).push(p); });
  let html = '';
  for (const [res, list] of Object.entries(grouped)) {
    html += `<div class="col-12"><strong>${res}</strong></div>`;
    list.forEach(p => {
      html += `<div class="col-md-6"><div class="form-check">
        <input class="form-check-input perm-cb" type="checkbox" value="${p.code}" id="cb-${p.id}" ${selected.includes(p.code)?'checked':''}>
        <label class="form-check-label" for="cb-${p.id}">
          <code>${p.code}</code> <small class="text-muted">${p.name}</small>
        </label>
      </div></div>`;
    });
  }
  document.getElementById('permCheckboxes').innerHTML = html;
}
async function saveRole() {
  const id = document.getElementById('roleId').value;
  const code = document.getElementById('roleCode').value.trim();
  const name = document.getElementById('roleName').value.trim();
  const desc = document.getElementById('roleDesc').value.trim();
  const perms = Array.from(document.querySelectorAll('.perm-cb:checked')).map(cb=>cb.value);
  if (!code || !name) { alert('请填写代码和名称'); return; }
  try {
    if (id) {
      await api('/api/rbac/roles/'+id, {method:'PUT', body: JSON.stringify({description:desc, permissions:perms})});
    } else {
      await api('/api/rbac/roles', {method:'POST', body: JSON.stringify({code, name, description:desc, permissions:perms})});
    }
    bootstrap.Modal.getInstance(document.getElementById('roleModal')).hide();
    loadRoles();
  } catch(e) { alert('保存失败: '+e.message); }
}
async function deleteRole(id, name) {
  if (!confirm('确认删除角色「'+name+'」？')) return;
  try {
    await api('/api/rbac/roles/'+id, {method:'DELETE'});
    loadRoles();
  } catch(e) { alert('删除失败: '+e.message); }
}

async function openAssignRoleModal(userId, username) {
  document.getElementById('assignUsername').textContent = username;
  try {
    const userRoles = await api('/api/rbac/users/'+userId+'/roles');
    const codes = new Set(userRoles.map(r=>r.code));
    const html = ALL_ROLES.map(r=>`
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="ar-${r.id}" ${codes.has(r.code)?'checked':''}>
        <label class="form-check-label" for="ar-${r.id}">
          <span class="badge bg-primary">${r.code}</span> ${r.name}
        </label>
      </div>
    `).join('');
    document.getElementById('assignRoleList').innerHTML = html;
    document.getElementById('assignRoleList').dataset.userId = userId;
    new bootstrap.Modal(document.getElementById('assignRoleModal')).show();
  } catch(e) { alert(e.message); }
}

document.getElementById('assignRoleModal').addEventListener('change', async (e)=>{
  if (e.target.matches('.form-check-input')) {
    const userId = document.getElementById('assignRoleList').dataset.userId;
    const cb = e.target;
    const roleId = cb.id.replace('ar-','');
    const checked = cb.checked;
    try {
      if (checked) {
        await api('/api/rbac/users/'+userId+'/roles', {method:'POST', body: JSON.stringify({role_id: parseInt(roleId)})});
      } else {
        await api('/api/rbac/users/'+userId+'/roles/'+roleId, {method:'DELETE'});
      }
      loadUsers();
    } catch(err) { cb.checked = !checked; alert('操作失败: '+err.message); }
  }
});

document.addEventListener('DOMContentLoaded', loadAll);
</script>
{% endblock %}
