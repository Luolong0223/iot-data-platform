{% extends "base_v2.html" %}

{% block title %}设备管理 - IoT平台{% endblock %}
{% block page_title %}设备管理{% endblock %}
{% block breadcrumb %}<a href="/devices">设备管理</a>{% endblock %}

{% block content %}
<div class="page-content">
    <!-- 工具栏 -->
    <div class="toolbar">
        <div class="toolbar-left">
            <div class="search-box">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" id="searchInput" placeholder="搜索设备名称、类型..." />
            </div>
            <select id="filterStatus" class="filter-select">
                <option value="">全部状态</option>
                <option value="online">在线</option>
                <option value="offline">离线</option>
                <option value="error">异常</option>
            </select>
            <select id="filterType" class="filter-select">
                <option value="">全部类型</option>
                <option value="temperature">温度传感器</option>
                <option value="humidity">湿度传感器</option>
                <option value="pressure">压力传感器</option>
                <option value="gateway">网关</option>
            </select>
        </div>
        <div class="toolbar-right">
            <button class="btn btn-outline" onclick="refreshDevices()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
                    <polyline points="21 3 21 9 15 9"/>
                </svg>
                刷新
            </button>
            <button class="btn btn-primary" onclick="showAddDeviceModal()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                添加设备
            </button>
        </div>
    </div>

    <!-- 统计卡片 -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon bg-blue-50 text-blue-600">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="4" y="4" width="16" height="16" rx="2" ry="2"/>
                    <rect x="9" y="9" width="6" height="6"/>
                    <line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/>
                    <line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/>
                    <line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/>
                    <line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/>
                </svg>
            </div>
            <div class="stat-info">
                <span class="stat-value" id="totalDevices">--</span>
                <span class="stat-label">设备总数</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon bg-green-50 text-green-600">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                </svg>
            </div>
            <div class="stat-info">
                <span class="stat-value text-green-600" id="onlineDevices">--</span>
                <span class="stat-label">在线设备</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon bg-red-50 text-red-500">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/>
                    <line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
            </div>
            <div class="stat-info">
                <span class="stat-value text-red-500" id="offlineDevices">--</span>
                <span class="stat-label">离线设备</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon bg-orange-50 text-orange-500">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                    <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
                </svg>
            </div>
            <div class="stat-info">
                <span class="stat-value text-orange-500" id="alertDevices">--</span>
                <span class="stat-label">告警设备</span>
            </div>
        </div>
    </div>

    <!-- 设备列表 -->
    <div class="card">
        <div class="card-header">
            <h3>设备列表</h3>
            <span class="badge badge-primary" id="deviceCount">0 个设备</span>
        </div>
        <div class="table-container">
            <table class="data-table" id="deviceTable">
                <thead>
                    <tr>
                        <th><input type="checkbox" id="selectAll"></th>
                        <th>设备名称</th>
                        <th>类型</th>
                        <th>状态</th>
                        <th>位置</th>
                        <th>最后通信</th>
                        <th>数据点数</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="deviceTableBody">
                    <!-- 动态加载 -->
                </tbody>
            </table>
        </div>
        <div class="pagination" id="pagination"></div>
    </div>
</div>

<!-- 添加/编辑设备弹窗 -->
<div class="modal-overlay" id="deviceModal" style="display: none;">
    <div class="modal modal-lg">
        <div class="modal-header">
            <h3 id="modalTitle">添加设备</h3>
            <button class="btn-close" onclick="closeModal()">&times;</button>
        </div>
        <form id="deviceForm" onsubmit="saveDevice(event)">
            <div class="modal-body">
                <input type="hidden" id="deviceId">
                <div class="form-grid">
                    <div class="form-group">
                        <label>设备名称 <span class="required">*</span></label>
                        <input type="text" id="deviceName" required placeholder="输入设备名称">
                    </div>
                    <div class="form-group">
                        <label>设备类型 <span class="required">*</span></label>
                        <select id="deviceType" required>
                            <option value="">选择类型</option>
                            <option value="temperature">温度传感器</option>
                            <option value="humidity">湿度传感器</option>
                            <option value="pressure">压力传感器</option>
                            <option value="gateway">网关</option>
                            <option value="camera">摄像头</option>
                            <option value="other">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>设备编号</label>
                        <input type="text" id="deviceCode" placeholder="可选，唯一标识">
                    </div>
                    <div class="form-group">
                        <label>安装位置</label>
                        <input type="text" id="deviceLocation" placeholder="如：A栋3楼机房">
                    </div>
                    <div class="form-group full-width">
                        <label>备注说明</label>
                        <textarea id="deviceRemark" rows="3" placeholder="设备描述或特殊配置"></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline" onclick="closeModal()">取消</button>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>

<!-- 设备详情侧边栏 -->
<div class="sidebar-panel" id="deviceDetailPanel" style="display: none;">
    <div class="sidebar-header">
        <h3>设备详情</h3>
        <button class="btn-close" onclick="closeDetailPanel()">&times;</button>
    </div>
    <div class="sidebar-body" id="deviceDetailContent">
        <!-- 动态加载 -->
    </div>
</div>

<script src="{{ url_for('static', filename='js/v2/devices.js') }}"></script>
{% endblock %}
