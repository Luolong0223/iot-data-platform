{% extends "base.html" %}

{% set hide_nav = true %}

{% block title %}登录 - IoT Data Platform{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-card card">
        <div class="card-body">
            <div class="login-logo">
                <i class="bi bi-cpu"></i>
                <h4 class="mt-2 mb-0">IoT Data Platform</h4>
                <p class="text-muted mb-0">物联网数据可视化平台</p>
            </div>
            <form method="POST" action="{{ url_for('login') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label for="username" class="form-label">用户名</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="username" name="username" placeholder="请输入用户名" required autofocus>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">密码</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="password" name="password" placeholder="请输入密码" required>
                    </div>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="bi bi-box-arrow-in-right"></i> 登录
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
